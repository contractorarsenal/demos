.service-card{position:relative;padding:22px 20px 20px;border-radius:var(--cut);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);overflow:hidden;transition:transform var(--tr),border-color var(--tr),box-shadow var(--tr);}
.service-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(209,161,52,.08),transparent 42%);opacity:0;transition:opacity var(--tr);}
.service-card:hover{transform:translateY(-5px);border-color:rgba(209,161,52,.28);box-shadow:0 18px 42px rgba(0,0,0,.22);}
.service-card:hover::before{opacity:1;}
.service-card > *{position:relative;z-index:2;}
.service-icon{width:44px;height:44px;border-radius:var(--cut);background:rgba(209,161,52,.12);display:flex;align-items:center;justify-content:center;color:var(--gold-soft);margin-bottom:16px;}
.service-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.34rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;margin-bottom:8px;}
.service-card p{font-size:.88rem;font-weight:300;color:rgba(255,255,255,.58);line-height:1.7;margin-bottom:14px;}
